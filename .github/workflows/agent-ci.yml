name: agent-ci

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent-ci.yml'
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/agent-ci.yml'

defaults:
  run:
    working-directory: agent

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy tradingagents_us api
        continue-on-error: true  # Strict mode — relax until phase 4

      - name: Pytest
        run: uv run pytest --cov=tradingagents_us --cov-report=term

  build-image:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push — wire ECR push in phase 4)
        uses: docker/build-push-action@v6
        with:
          context: agent
          push: false
          tags: ai-trader-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
